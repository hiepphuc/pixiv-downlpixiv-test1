name: Build EXE

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        
      - name: Setup python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          pip install -r requirements.txt
          
      - name: Build app using pyinstaller
        run: |
          pyinstaller --noconsole --onefile --name "PixivDownloader" --icon "app_icon.ico" main.py

      - name: Upload file .exe to Github Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: PixivDownloaderEXE
          path: dist/PixivDownloader.exe
